# Build the Tauri desktop app for macOS (universal), Linux x86_64 and
# Windows x86_64.
#
# Triggers:
#   - push a tag starting with `v` (e.g. `git tag v0.1.0 && git push --tags`)
#     → creates a GitHub draft release and attaches the installers.
#   - workflow_dispatch (manual run from the GitHub UI)
#     → builds everything and uploads as workflow artifacts only.
#
# Notes:
#   - macOS is built with `--target universal-apple-darwin` so a single `.dmg`
#     works on both Intel and Apple Silicon.
#   - The project has no native C dependencies (no OpenSSL/ssh2), so no extra
#     toolchain workarounds are needed — Linux just needs the WebKitGTK dev libs.

name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            label: macos-universal
            rust-targets: "aarch64-apple-darwin,x86_64-apple-darwin"
            tauri-args: "--target universal-apple-darwin"
            bundle-dir: src-tauri/target/universal-apple-darwin/release/bundle
          - os: ubuntu-22.04
            label: linux-x86_64
            rust-targets: "x86_64-unknown-linux-gnu"
            tauri-args: ""
            bundle-dir: src-tauri/target/release/bundle
          - os: windows-latest
            label: windows-x86_64
            rust-targets: "x86_64-pc-windows-msvc"
            tauri-args: ""
            bundle-dir: src-tauri/target/release/bundle

    steps:
      - uses: actions/checkout@v4

      # ---- platform-specific system deps -------------------------------------
      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      # ---- toolchains --------------------------------------------------------
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ${{ matrix.label }}
          workspaces: src-tauri
          cache-on-failure: true

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      # ---- build + bundle ----------------------------------------------------
      # tauri-action runs `tauri build` (which runs `pnpm build` via the
      # config's beforeBuildCommand) and produces the platform installers:
      # .dmg / .app.tar.gz (macOS), .msi / setup .exe (Windows),
      # .AppImage / .deb / .rpm (Linux).
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS code signing + notarization. tauri-action signs, notarizes and
          # staples automatically when these are set. Leave the secrets empty to
          # produce an unsigned build (users will need to right-click → Open).
          # Create them in: Settings → Secrets and variables → Actions.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          args: ${{ matrix.tauri-args }}

      # ---- artifacts (always uploaded to the workflow) ----------------------
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: devsweep-${{ matrix.label }}
          path: |
            ${{ matrix.bundle-dir }}/dmg/*.dmg
            ${{ matrix.bundle-dir }}/macos/*.app.tar.gz
            ${{ matrix.bundle-dir }}/msi/*.msi
            ${{ matrix.bundle-dir }}/nsis/*.exe
            ${{ matrix.bundle-dir }}/appimage/*.AppImage
            ${{ matrix.bundle-dir }}/deb/*.deb
            ${{ matrix.bundle-dir }}/rpm/*.rpm
          if-no-files-found: warn

      # ---- release attachment (only on tag pushes) -------------------------
      - name: Attach to draft release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          tag_name: ${{ github.ref_name }}
          name: DevSweep ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            ${{ matrix.bundle-dir }}/dmg/*.dmg
            ${{ matrix.bundle-dir }}/msi/*.msi
            ${{ matrix.bundle-dir }}/nsis/*.exe
            ${{ matrix.bundle-dir }}/appimage/*.AppImage
            ${{ matrix.bundle-dir }}/deb/*.deb
            ${{ matrix.bundle-dir }}/rpm/*.rpm
